name: manip-as-in-sim
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.4.0+cu121
      - torchvision==0.19.0+cu121
      - xformers==0.0.27.post2
      - opencv-python
      - matplotlib
      - numpy
      - pillow
      - pyrealsense2
      - pupil-apriltags
      - huggingface_hub
      - hf_xet
      - pyyaml
      - typeguard
      - -e ./cdm
